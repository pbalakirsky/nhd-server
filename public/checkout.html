<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Checkout — Nina's Homemade Delights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,600;0,6..12,700;1,6..12,400&family=WindSong:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
  <meta property="og:title" content="Checkout — Nina's Homemade Delights" />
  <meta property="og:description" content="Complete your order for premium handmade cakes and desserts from Nina's Homemade Delights." />
  <meta property="og:image" content="https://nhd-static-assets.s3.amazonaws.com/cdn/64779458477d1aa4405357ad/64ac646aa0159eddda1a5f5e_NinaSergeyWedding_0088%201.png" />
  <meta property="og:url" content="https://www.ninashomemadedelights.com/checkout.html" />
  <meta property="og:type" content="website" />
</head>
<body>

  <div id="checkout-content" class="checkout-message" style="padding:4rem 0;">
    <div class="container">
      <div id="checkout-default">
        <h1>Your Order</h1>
        <p>Review your items below, then proceed to secure checkout.</p>
        <div id="checkout-items" style="max-width:600px;margin:2rem auto;"></div>
        <div id="checkout-actions" style="max-width:600px;margin:0 auto;text-align:center;"></div>
      </div>

      <div id="checkout-success" style="display:none">
        <div class="icon" style="font-size:3rem;color:#2e7d32;margin-bottom:1rem;">&#10003;</div>
        <h1>Thank You!</h1>
        <p>Your order has been placed successfully.</p>
        <div id="order-details" style="max-width:500px;margin:1.5rem auto;text-align:left;"></div>
        <a href="/" class="btn btn-primary mt-3">Back to Home</a>
      </div>

      <div id="checkout-cancel" style="display:none">
        <div class="icon" style="font-size:3rem;color:#c0392b;margin-bottom:1rem;">&#10007;</div>
        <h1>Order Canceled</h1>
        <p>Your order was not completed. Your cart items are still saved.</p>
        <a href="/category/all-products.html" class="btn btn-primary mt-3">Continue Shopping</a>
      </div>
    </div>
  </div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);

    if (params.get('success') === 'true') {
      document.getElementById('checkout-default').style.display = 'none';
      document.getElementById('checkout-success').style.display = 'block';
      NHDCart.clear();
      var sessionId = params.get('session_id');
      if (sessionId) {
        fetch('/api/order/' + sessionId)
          .then(function(r) { return r.json(); })
          .then(function(order) {
            if (order.items) {
              var html = '<h3 style="margin-bottom:0.75rem;">Order Summary</h3>';
              order.items.forEach(function(item) {
                html += '<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(0,0,0,0.06);">';
                html += '<span>' + item.name + ' x' + item.quantity + '</span>';
                html += '<strong>$' + item.total.toFixed(2) + '</strong></div>';
              });
              html += '<div style="display:flex;justify-content:space-between;padding:0.75rem 0;font-size:1.1rem;font-weight:700;">';
              html += '<span>Total</span><span>$' + order.total.toFixed(2) + '</span></div>';
              if (order.email) html += '<p style="margin-top:1rem;color:#6b6b6b;font-size:0.9rem;">Confirmation sent to ' + order.email + '</p>';
              document.getElementById('order-details').innerHTML = html;
            }
          }).catch(function() {});
      }
      return;
    }

    if (params.get('canceled') === 'true') {
      document.getElementById('checkout-default').style.display = 'none';
      document.getElementById('checkout-cancel').style.display = 'block';
      return;
    }

    // ---- Shipping calculator ----
    // Origin: Ellicott City, MD 21042
    // Weight: 3 lbs per item
    // Rates: approximate UPS Ground from 21042 by zone and total weight

    // Zone lookup by 3-digit zip prefix
    // Local = MD, DC, VA, DE, WV (UPS zones 2-3)
    // Regional = PA, NJ, NY, CT, MA, NH, VT, ME, RI, NC, SC, GA, OH, WV (zones 3-5)
    // National = everything else (zones 6-8)
    var LOCAL_PREFIXES = [
      '197','198','199',
      '200','201','202','203','204','205','206','207','208','209',
      '210','211','212','213','214','215','216','217','218','219',
      '220','221','222','223','224','225','226','227','228','229',
      '230','231','232','233','234','235','236','237','238','239',
      '240','241','242','243','244','245','246','247',
      '248','249','250','251','252','253','254','255','256','257','258','259','260','261','262','263','264','265','266','267','268'
    ];
    var REGIONAL_PREFIXES = [
      '010','011','012','013','014','015','016','017','018','019',
      '020','021','022','023','024','025','026','027','028','029',
      '030','031','032','033','034','035','036','037','038','039',
      '040','041','042','043','044','045','046','047','048','049',
      '050','051','052','053','054','055','056','057','058','059',
      '060','061','062','063','064','065','066','067','068','069',
      '070','071','072','073','074','075','076','077','078','079',
      '080','081','082','083','084','085','086','087','088','089',
      '100','101','102','103','104','105','106','107','108','109',
      '110','111','112','113','114','115','116','117','118','119',
      '120','121','122','123','124','125','126','127','128','129',
      '130','131','132','133','134','135','136','137','138','139',
      '140','141','142','143','144','145','146','147','148','149',
      '150','151','152','153','154','155','156','157','158','159',
      '160','161','162','163','164','165','166','167','168','169',
      '170','171','172','173','174','175','176','177','178','179',
      '180','181','182','183','184','185','186','187','188','189',
      '190','191','192','193','194','195','196',
      '269','270','271','272','273','274','275','276','277','278','279',
      '280','281','282','283','284','285','286','287','288','289',
      '290','291','292','293','294','295','296','297','298','299',
      '300','301','302','303','304','305','306','307','308','309',
      '310','311','312','313','314','315','316','317','318','319',
      '430','431','432','433','434','435','436','437','438','439',
      '440','441','442','443','444','445','446','447','448','449',
      '450','451','452','453','454','455','456','457','458','459'
    ];

    // Per-item shipping — each item ships in its own box
    // Real data: MD $15.45, NYC $16, GA $33, CO $35, UT $50 (full cakes)
    // Base rates for a full-size cake box [local, regional, national]
    var FULL_CAKE_RATE = [15.50, 16.00, 35.00];

    // Ship rate multiplier per product (relative to full cake box)
    // 1.0 = full cake box, smaller items = fraction
    var SHIP_MULTIPLIERS = {
      "A Pirate's Dream":    1.0,   // full bundt cake
      "Chocolate Surrender": 1.0,
      "Day & Night":         1.0,   // layered cake
      "Just Peachy":         1.0,
      "Lemon Cake":          1.0,
      "Red Velvet Cake":     1.0,
      "Creme de la Creme":   1.0,   // 3lb flan
      "Cakesters":           0.75,  // dozen mini cakes, medium box
      "Individually Wrapped Cakesters": 0.75,
      "Honey Crunch":        0.65,  // teiglach, medium container
      "Cookie Royale":       0.45,  // per-pound cookies, small box
      "One Tough Cookie":    0.45,  // per-pound biscotti, small box
      "Apple Confiture":     0.35,  // small jar
      "Heaven's Best":       0,     // local pickup only
      "Have Your Cake and Eat It": 0 // local pickup only
    };

    var DEFAULT_WEIGHT = 4; // fallback if item has no weight set

    function getShippingZone(zip) {
      if (!zip || zip.length < 5) return null;
      var prefix = zip.substring(0, 3);
      if (LOCAL_PREFIXES.indexOf(prefix) !== -1) return 0; // local
      if (REGIONAL_PREFIXES.indexOf(prefix) !== -1) return 1; // regional
      return 2; // national
    }

    var ZONE_NAMES = ['Local (MD/DC/VA/DE/WV)', 'Regional (East Coast)', 'National'];

    function calcShipping(zoneIndex, cartItems) {
      var total = 0;
      cartItems.forEach(function(item) {
        var mult = SHIP_MULTIPLIERS[item.name];
        if (mult === undefined) mult = 1.0; // default to full cake if unknown
        if (mult === 0) return; // pickup only, no shipping
        total += FULL_CAKE_RATE[zoneIndex] * mult * item.quantity;
      });
      return Math.round(total * 100) / 100;
    }

    var shippingCost = 0;
    var subtotal = 0;
    var totalItems = 0;
    var totalWeight = 0;
    var savedZip = '';

    var itemsDiv = document.getElementById('checkout-items');
    var actionsDiv = document.getElementById('checkout-actions');

    function renderCheckout() {
      var items = NHDCart.getItems();

      if (!items.length) {
        itemsDiv.innerHTML = '<p style="text-align:center;padding:3rem 0;">Your cart is empty.</p>';
        actionsDiv.innerHTML = '<a href="/category/all-products.html" class="btn btn-outline">Start Shopping</a>';
        return;
      }

      // Build item rows with quantity controls and remove button
      var html = '';
      totalItems = 0;
      totalWeight = 0;
      items.forEach(function(item, i) {
        totalItems += item.quantity;
        totalWeight += (item.weight || DEFAULT_WEIGHT) * item.quantity;
        html += '<div style="display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid rgba(0,0,0,0.06);align-items:center;">';
        html += '<img src="' + item.image + '" alt="' + item.name + '" style="width:60px;height:60px;border-radius:8px;object-fit:cover;" />';
        html += '<div style="flex:1;text-align:left;">';
        html += '<strong style="color:#1a1a1a;">' + item.name + '</strong>';
        if (item.options && item.options.length) {
          html += '<br><small style="color:#6b6b6b;">' + item.options.join(', ') + '</small>';
        }
        html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.4rem;">';
        html += '<button onclick="changeQty(' + i + ',-1)" style="width:28px;height:28px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:1rem;line-height:1;color:#6b6b6b;">&minus;</button>';
        html += '<span style="min-width:20px;text-align:center;font-weight:600;color:#1a1a1a;">' + item.quantity + '</span>';
        html += '<button onclick="changeQty(' + i + ',1)" style="width:28px;height:28px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:1rem;line-height:1;color:#6b6b6b;">&plus;</button>';
        html += '<button onclick="removeItem(' + i + ')" style="margin-left:0.5rem;border:none;background:none;cursor:pointer;color:#c0392b;font-size:0.85rem;text-decoration:underline;">Remove</button>';
        html += '</div>';
        html += '</div>';
        html += '<div style="text-align:right;">';
        html += '<strong style="color:#8b5e3c;">$' + (item.price * item.quantity).toFixed(2) + '</strong>';
        html += '</div>';
        html += '</div>';
      });
      itemsDiv.innerHTML = html;

      subtotal = NHDCart.getTotal();

      // Preserve zip input value
      var currentZip = savedZip;

      actionsDiv.innerHTML = ''
        + '<div style="text-align:left;margin:1.5rem 0;padding:1.5rem;background:#faf7f5;border-radius:12px;">'
        + '<p style="font-weight:700;color:#1a1a1a;margin-bottom:0.25rem;">Estimate Shipping</p>'
        + '<p style="font-size:0.85rem;color:#6b6b6b;margin-bottom:0.75rem;">' + totalItems + ' item' + (totalItems > 1 ? 's' : '') + ' &mdash; shipped via UPS Ground from Ellicott City, MD</p>'
        + '<div style="display:flex;gap:0.5rem;align-items:center;">'
        + '<input type="text" id="shipping-zip" placeholder="Enter zip code" maxlength="5" pattern="[0-9]*" inputmode="numeric" value="' + currentZip + '" style="flex:1;padding:0.6rem 1rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;" />'
        + '<button class="btn btn-outline" onclick="estimateShipping()" style="white-space:nowrap;">Calculate</button>'
        + '</div>'
        + '<label style="display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;font-size:0.9rem;color:#6b6b6b;cursor:pointer;">'
        + '<input type="checkbox" id="local-pickup" onchange="togglePickup()" /> I\'ll pick up my order (Ellicott City, MD area)'
        + '</label>'
        + '<p id="shipping-zone-msg" style="font-size:0.85rem;color:#6b6b6b;margin-top:0.5rem;"></p>'
        + '</div>'
        + '<div style="max-width:600px;margin:1rem 0;">'
        + '<div style="display:flex;justify-content:space-between;font-size:1rem;color:#6b6b6b;margin:0.5rem 0;">'
        + '<span>Subtotal</span><span id="subtotal-amount">$' + subtotal.toFixed(2) + '</span></div>'
        + '<div style="display:flex;justify-content:space-between;font-size:1rem;color:#6b6b6b;margin:0.5rem 0;">'
        + '<span>Shipping &amp; Handling</span><span id="shipping-amount">&mdash;</span></div>'
        + '<div style="display:flex;justify-content:space-between;font-size:1.2rem;font-weight:700;color:#1a1a1a;margin:1rem 0;padding-top:0.75rem;border-top:1px solid rgba(0,0,0,0.1);">'
        + '<span>Total</span><span id="order-total">$' + subtotal.toFixed(2) + '</span></div>'
        + '</div>'
        + '<button id="checkout-pay-btn" class="btn btn-primary btn-full" onclick="proceedToCheckout()" disabled>Enter zip code to continue</button>'
        + '<p style="font-size:0.8rem;color:#6b6b6b;margin-top:0.75rem;">You\'ll be redirected to Stripe\'s secure payment page.</p>'
        ;

      // Zelle section — rendered outside the 600px actions div for true page centering
      var zelleDiv = document.createElement('div');
      zelleDiv.style.cssText = 'margin:2rem auto 0;padding:1.5rem 2rem;border-top:1px solid rgba(0,0,0,0.1);text-align:center;max-width:600px;';
      zelleDiv.innerHTML = ''
        + '<p style="font-weight:700;color:#1a1a1a;margin-bottom:0.5rem;">Or pay with Zelle or Venmo</p>'
        + '<p style="font-size:0.9rem;color:#6b6b6b;margin-bottom:0.5rem;">Send your total (including shipping) to one of the following:</p>'
        + '<p style="font-size:0.95rem;color:#1a1a1a;margin:0.75rem 0 0.25rem;">443-204-4402</p>'
        + '<p style="font-size:0.95rem;color:#1a1a1a;margin:0.25rem 0;">nina.malyutina@gmail.com</p>'
        + '<p style="font-size:0.8rem;color:#6b6b6b;margin-top:0.75rem;">Please include your name and order details in the Zelle memo. We\'ll confirm your order via email.</p>';
      document.getElementById('checkout-content').querySelector('.container').appendChild(zelleDiv);

      // Re-calculate shipping if zip was already entered
      if (currentZip.length === 5) {
        estimateShipping();
      }
    }

    function updateTotals() {
      var totalEl = document.getElementById('order-total');
      var shippingEl = document.getElementById('shipping-amount');
      var grandTotal = subtotal + shippingCost;
      if (totalEl) totalEl.textContent = '$' + grandTotal.toFixed(2);
      var pickup = document.getElementById('local-pickup');
      if (shippingEl) {
        if (pickup && pickup.checked) {
          shippingEl.textContent = 'FREE (Pickup)';
        } else if (shippingCost > 0) {
          shippingEl.textContent = '$' + shippingCost.toFixed(2);
        } else {
          shippingEl.innerHTML = '&mdash;';
        }
      }
    }

    window.changeQty = function(index, delta) {
      var items = NHDCart.getItems();
      var newQty = items[index].quantity + delta;
      savedZip = (document.getElementById('shipping-zip') || {}).value || '';
      NHDCart.updateQuantity(index, newQty);
      renderCheckout();
    };

    window.removeItem = function(index) {
      savedZip = (document.getElementById('shipping-zip') || {}).value || '';
      NHDCart.removeItem(index);
      renderCheckout();
    };

    window.estimateShipping = function() {
      var zip = document.getElementById('shipping-zip').value.trim();
      savedZip = zip;
      var pickup = document.getElementById('local-pickup');
      if (pickup) pickup.checked = false;
      if (zip.length !== 5 || !/^\d{5}$/.test(zip)) {
        document.getElementById('shipping-zone-msg').textContent = 'Please enter a valid 5-digit zip code.';
        return;
      }
      var zoneIndex = getShippingZone(zip);
      shippingCost = calcShipping(zoneIndex, NHDCart.getItems());
      document.getElementById('shipping-zone-msg').textContent = 'Zone: ' + ZONE_NAMES[zoneIndex] + ' \u2014 ' + totalItems + ' item' + (totalItems > 1 ? 's' : '') + ' \u2014 UPS Ground (1\u20135 business days)';
      updateTotals();
      enableCheckout();
    };

    window.togglePickup = function() {
      var pickup = document.getElementById('local-pickup');
      if (pickup.checked) {
        shippingCost = 0;
        savedZip = '';
        document.getElementById('shipping-zip').value = '';
        document.getElementById('shipping-zone-msg').textContent = 'Local pickup \u2014 contact us to arrange a time.';
        updateTotals();
        enableCheckout();
      } else {
        shippingCost = 0;
        document.getElementById('shipping-zone-msg').textContent = '';
        updateTotals();
        disableCheckout();
      }
    };

    function enableCheckout() {
      var btn = document.getElementById('checkout-pay-btn');
      btn.disabled = false;
      btn.textContent = 'Pay with Card';
    }

    function disableCheckout() {
      var btn = document.getElementById('checkout-pay-btn');
      btn.disabled = true;
      btn.textContent = 'Enter zip code to continue';
    }

    // Initial render
    renderCheckout();

    window.proceedToCheckout = function() {
      var cartItems = NHDCart.getItems();
      if (!cartItems.length) return;
      var btn = document.getElementById('checkout-pay-btn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      var payload = {
        items: cartItems.map(function(i) {
          return {
            name: i.name + (i.options && i.options.length ? ' (' + i.options.join(', ') + ')' : ''),
            price: i.price,
            quantity: i.quantity,
            image: i.image
          };
        }),
        shipping: shippingCost
      };

      fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.url) { window.location.href = data.url; }
        else { alert('Something went wrong. Please try again.'); }
      })
      .catch(function() {
        alert('Could not connect to checkout. Please try again.');
      })
      .finally(function() {
        btn.disabled = false;
        btn.textContent = 'Pay with Card';
      });
    };

  })();
  </script>
</body>
</html>
