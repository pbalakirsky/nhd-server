<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>A Pirate's Dream — Nina's Homemade Delights</title>
  <meta name="description" content="A rich, deeply flavorful rum cake soaked in authentic Caribbean rums and finished with a buttery glaze. Topped with premium toasted nuts for the perfect balance of sweet and savory." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b0853fa696bee9e7976823_DSC_7085%20(1).JPG" alt="A Pirate's Dream" />
      </div>
      <div class="product-detail-info">
        <h1>A Pirate's Dream</h1>
        <p class="product-subtitle">Rum Cake</p>
        <p class="product-price">$60.00</p>
        <p class="product-description">A rich, deeply flavorful rum cake soaked in authentic Caribbean rums and finished with a buttery glaze. Topped with premium toasted nuts for the perfect balance of sweet and savory.</p>

        <div class="product-form-group">
          <label for="topping">Topping</label>
          <select id="topping">
            <option value="with Nuts">with Nuts</option>
            <option value="without Nuts">without Nuts</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Golden Rum">Golden Rum</option>
            <option value="Chocolate">Chocolate</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: "A Pirate's Dream",
      price: 60.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b0853fa696bee9e7976823_DSC_7085%20(1).JPG',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
