</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6535ebb46047abfdf8372704_DSC_7154.JPG" alt="Have Your Cake and Eat It" />
      </div>
      <div class="product-detail-info">
        <span class="pickup-badge">Local Pickup Only</span>
        <h1>Have Your Cake and Eat It</h1>
        <p class="product-subtitle">Bundle</p>
        <p class="product-price">$25.00</p>
        <p class="product-description">The best of both worlds — a golden rum Cakester paired with a dozen Heaven's Best frozen dessert bites. A perfect sampler for anyone who wants it all. Local pickup only.</p>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Have Your Cake and Eat It',
      price: 25.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6535ebb46047abfdf8372704_DSC_7154.JPG',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
