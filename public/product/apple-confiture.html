  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Product","name":"Apple Confiture","image":"https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6577be9552c7234869bc1da1_IMG_4157.jpg","description":"Slow-cooked with hand-selected apples and warm spices, our confiture is endlessly versatile. Pair it with cheese, spread on fresh bread, or use as a refined dessert topping.","offers":{"@type":"Offer","price":"7.00","priceCurrency":"USD","availability":"https://schema.org/InStock"}}</script>
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6577be9552c7234869bc1da1_IMG_4157.jpg" alt="Apple Confiture" />
      </div>
      <div class="product-detail-info">
        <h1>Apple Confiture</h1>
        <p class="product-price">$7.00</p>
        <p class="product-description">Slow-cooked with hand-selected apples and warm spices, our confiture is endlessly versatile. Pair it with cheese, spread on fresh bread, or use as a refined dessert topping.</p>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Apple Confiture',
      price: 7.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6577be9552c7234869bc1da1_IMG_4157.jpg',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
