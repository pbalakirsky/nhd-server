<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Honey Crunch — Nina's Homemade Delights</title>
  <meta name="description" content="A traditional teiglach made with clusters of golden dough, aromatic nuts, and poppy seeds, bound in warm honey. A stunning centerpiece for any gathering." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b084d0151326ef4e81cfaf_DSC_7174.JPG" alt="Honey Crunch" />
      </div>
      <div class="product-detail-info">
        <h1>Honey Crunch</h1>
        <p class="product-subtitle">Teiglach</p>
        <p class="product-price">$30.00</p>
        <p class="product-description">A traditional teiglach made with clusters of golden dough, aromatic nuts, and poppy seeds, bound in warm honey. A stunning centerpiece for any gathering.</p>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Honey Crunch',
      price: 30.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b084d0151326ef4e81cfaf_DSC_7174.JPG',
      quantity: qty,
      options: options
    });
  }
  </script>
</body>
</html>
