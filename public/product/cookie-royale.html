<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Cookie Royale — Nina's Homemade Delights</title>
  <meta name="description" content="Our signature chocolate chip cookies — golden, buttery, and loaded with premium chocolate. Available by the pound in Classic, Chocolate-Mint, and Chocolate-Cinnamon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c979b20b0eee0d8dd1058_cookies.PNG" alt="Cookie Royale" />
      </div>
      <div class="product-detail-info">
        <h1>Cookie Royale</h1>
        <p class="product-price">$30.00</p>
        <p class="product-description">Our signature chocolate chip cookies — golden, buttery, and loaded with premium chocolate. Available by the pound in Classic, Chocolate-Mint, and Chocolate-Cinnamon.</p>

        <div class="product-form-group">
          <label for="size">Size</label>
          <select id="size">
            <option value="1 pound">1 pound</option>
            <option value="2 pounds">2 pounds</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Cookie Royale',
      price: 30.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c979b20b0eee0d8dd1058_cookies.PNG',
      quantity: qty,
      options: options
    });
  }
  </script>
</body>
</html>
