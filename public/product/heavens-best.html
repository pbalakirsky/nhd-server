<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Heaven's Best — Nina's Homemade Delights</title>
  <meta name="description" content="Crushed cookie, vanilla, coffee, and toasted nuts — frozen into perfectly portioned bites. Deceptively simple, impossibly addictive. Local pickup only." />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
  <meta property="og:title" content="Heaven's Best — Nina's Homemade Delights" />
  <meta property="og:description" content="Crushed cookie, vanilla, coffee, and toasted nuts — frozen into perfectly portioned bites. Deceptively simple, impossibly addictive. Local pickup only." />
  <meta property="og:image" content="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b07e7d40e8b121c68eccb8_DSC_7129%20(1).JPG" />
  <meta property="og:url" content="https://www.ninashomemadedelights.com/product/heavens-best.html" />
  <meta property="og:type" content="product" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Product","name":"Heaven's Best","image":"https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b07e7d40e8b121c68eccb8_DSC_7129%20(1).JPG","description":"Crushed cookie, vanilla, coffee, and toasted nuts — frozen into perfectly portioned bites. Deceptively simple, impossibly addictive. Local pickup only.","offers":{"@type":"Offer","price":"25.00","priceCurrency":"USD","availability":"https://schema.org/InStock"}}</script>
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b07e7d40e8b121c68eccb8_DSC_7129%20(1).JPG" alt="Heaven's Best" />
      </div>
      <div class="product-detail-info">
        <span class="pickup-badge">Local Pickup Only</span>
        <h1>Heaven's Best</h1>
        <p class="product-subtitle">Frozen Dessert Bites</p>
        <p class="product-price">$25.00</p>
        <p class="product-description">Crushed cookie, vanilla, coffee, and toasted nuts — frozen into perfectly portioned bites. Deceptively simple, impossibly addictive. Local pickup only.</p>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Chocolate Vanilla">Chocolate Vanilla</option>
            <option value="Coffee Vanilla">Coffee Vanilla</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: "Heaven's Best",
      price: 25.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/64b07e7d40e8b121c68eccb8_DSC_7129%20(1).JPG',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
