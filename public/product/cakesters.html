<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">

        <p class="product-price">$60.00</p>
        <p class="product-description">Our signature cakes in miniature — same premium ingredients, perfectly portioned. Ideal for events, gifting, or anytime you need an elegant touch.</p>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Golden Rum">Golden Rum</option>
            <option value="Rum Chocolate">Rum Chocolate</option>
            <option value="Kahlua Chocolate">Kahlua Chocolate</option>
            <option value="Lemon">Lemon</option>
            <option value="Red Velvet">Red Velvet</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="quantity-dozen">Quantity</label>
          <select id="quantity-dozen">
            <option value="1 dozen">1 dozen</option>
            <option value="2 dozen">2 dozen</option>
            <option value="3 dozen">3 dozen</option>

            <option value="5 dozen">5 dozen</option>

            <option value="9 dozen">9 dozen</option>
            <option value="10 dozen">10 dozen</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Cakesters',
      price: 60.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/647816c0da2709493f00fb56_cakester.jpg',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
