<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Individually Wrapped Cakesters — Nina's Homemade Delights</title>
  <meta name="description" content="Individually wrapped miniature cakes crafted with the same care as our full-size originals. The perfect ready-to-share gift for any occasion." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/647816c0da2709493f00fb56_cakester.jpg" alt="Individually Wrapped Cakesters" />
      </div>
      <div class="product-detail-info">
        <h1>Individually Wrapped Cakesters</h1>
        <p class="product-price">$70.00</p>
        <p class="product-description">Individually wrapped miniature cakes crafted with the same care as our full-size originals. The perfect ready-to-share gift for any occasion.</p>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Golden Rum">Golden Rum</option>
            <option value="Rum Chocolate">Rum Chocolate</option>
            <option value="Kahlua Chocolate">Kahlua Chocolate</option>
            <option value="Lemon">Lemon</option>
            <option value="Red Velvet">Red Velvet</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Individually Wrapped Cakesters',
      price: 70.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/647816c0da2709493f00fb56_cakester.jpg',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
