<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>One Tough Cookie — Nina's Homemade Delights</title>
  <meta name="description" content="Handcrafted biscotti with a satisfying crunch and rich almond flavor. Available in five distinctive varieties — perfect alongside coffee or as an elegant gift." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6536dfeff78f70ba567a67ab_image%20(4).png" alt="One Tough Cookie" />
      </div>
      <div class="product-detail-info">
        <h1>One Tough Cookie</h1>
        <p class="product-subtitle">Handcrafted Biscotti</p>
        <p class="product-price">$35.00</p>
        <p class="product-description">Handcrafted biscotti with a satisfying crunch and rich almond flavor. Available in five distinctive varieties — perfect alongside coffee or as an elegant gift.</p>

        <div class="product-form-group">
          <label for="variety">Variety</label>
          <select id="variety">
            <option value="Almond Cranberry">Almond Cranberry</option>
            <option value="Hazelnut Cranberry">Hazelnut Cranberry</option>
            <option value="Pistachio Vanilla">Pistachio Vanilla</option>
            <option value="Genuine Amaretti">Genuine Amaretti</option>
            <option value="Pine-nut Vanilla">Pine-nut Vanilla</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'One Tough Cookie',
      price: 35.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6536dfeff78f70ba567a67ab_image%20(4).png',
      quantity: qty,
      options: options
    });
  }
  </script>
</body>
</html>
