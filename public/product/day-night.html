<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Day &amp; Night — Nina's Homemade Delights</title>
  <meta name="description" content="Dark cocoa dough meets delicate zephyr cream in this striking layered cake. Choose from sweet icing, plum jam, or sour cherry for a refined balance of rich and tangy." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
  <meta property="og:title" content="Day &amp; Night — Nina's Homemade Delights" />
  <meta property="og:description" content="Dark cocoa dough meets delicate zephyr cream in this striking layered cake. Choose from sweet icing, plum jam, or sour cherry for a refined balance of rich and tangy." />
  <meta property="og:image" content="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c85502bb062c3aea61271_DSC_7110%20(1).JPG" />
  <meta property="og:url" content="https://www.ninashomemadedelights.com/product/day-night.html" />
  <meta property="og:type" content="product" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Product","name":"Day & Night","image":"https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c85502bb062c3aea61271_DSC_7110%20(1).JPG","description":"Dark cocoa dough meets delicate zephyr cream in this striking layered cake. Choose from sweet icing, plum jam, or sour cherry for a refined balance of rich and tangy.","offers":{"@type":"Offer","price":"60.00","priceCurrency":"USD","availability":"https://schema.org/InStock"}}</script>
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c85502bb062c3aea61271_DSC_7110%20(1).JPG" alt="Day &amp; Night" />
      </div>
      <div class="product-detail-info">
        <h1>Day &amp; Night</h1>
        <p class="product-price">$60.00</p>
        <p class="product-description">Dark cocoa dough meets delicate zephyr cream in this striking layered cake. Choose from sweet icing, plum jam, or sour cherry for a refined balance of rich and tangy.</p>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Sour Cherry">Sour Cherry</option>
            <option value="Plum">Plum</option>
            <option value="Sweet Icing">Sweet Icing</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Day & Night',
      price: 60.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c85502bb062c3aea61271_DSC_7110%20(1).JPG',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
