<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Red Velvet Cake — Nina's Homemade Delights</title>
  <meta name="description" content="Classic red velvet elevated with Limited Edition Red Velvet Cupcake Bailey's. Each moist layer carries a subtle warmth of Irish cream, finished with a lavish white chocolate coating." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6577be6f3e17b8b50947b5ca_IMG_1611.jpg" alt="Red Velvet Cake" />
      </div>
      <div class="product-detail-info">
        <h1>Red Velvet Cake</h1>
        <p class="product-price">$60.00</p>
        <p class="product-description">Classic red velvet elevated with Limited Edition Red Velvet Cupcake Bailey's. Each moist layer carries a subtle warmth of Irish cream, finished with a lavish white chocolate coating.</p>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Red Velvet Cake',
      price: 60.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/6577be6f3e17b8b50947b5ca_IMG_1611.jpg',
      quantity: qty,
      options: options
    });
  }
  </script>
</body>
</html>
