<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Creme de la Creme — Nina's Homemade Delights</title>
  <meta name="description" content="A showstopping three-pound flan crafted for gatherings of fifteen or more. Choose between our silky classic vanilla or fresh berries vanilla — both unforgettable." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=WindSong&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
  <meta property="og:title" content="Creme de la Creme — Nina's Homemade Delights" />
  <meta property="og:description" content="A showstopping three-pound flan crafted for gatherings of fifteen or more. Choose between our silky classic vanilla or fresh berries vanilla — both unforgettable." />
  <meta property="og:image" content="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c90432bb062c3aeb28086_DSC_7144.JPG" />
  <meta property="og:url" content="https://www.ninashomemadedelights.com/product/creme-de-la-creme.html" />
  <meta property="og:type" content="product" />
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Product","name":"Creme de la Creme","image":"https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c90432bb062c3aeb28086_DSC_7144.JPG","description":"A showstopping three-pound flan crafted for gatherings of fifteen or more. Choose between our silky classic vanilla or fresh berries vanilla — both unforgettable.","offers":{"@type":"Offer","price":"40.00","priceCurrency":"USD","availability":"https://schema.org/InStock"}}</script>
</head>
<body>
  <!-- nav injected by components.js -->

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-img">
        <img src="https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c90432bb062c3aeb28086_DSC_7144.JPG" alt="Creme de la Creme" />
      </div>
      <div class="product-detail-info">
        <h1>Creme de la Creme</h1>
        <p class="product-subtitle">Flan</p>
        <p class="product-price">$40.00</p>
        <p class="product-description">A showstopping three-pound flan crafted for gatherings of fifteen or more. Choose between our silky classic vanilla or fresh berries vanilla — both unforgettable.</p>

        <div class="product-form-group">
          <label for="flavor">Flavor</label>
          <select id="flavor">
            <option value="Vanilla">Vanilla</option>
            <option value="Fresh Berries Vanilla">Fresh Berries Vanilla</option>
          </select>
        </div>

        <div class="product-form-group">
          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1" max="10" />
        </div>

        <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
      </div>
    </div>
  </section>

  <!-- footer injected by components.js -->
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
  function addToCart() {
    const options = [];
    document.querySelectorAll('.product-detail-info select').forEach(s => {
      options.push(s.value);
    });
    const qtyEl = document.getElementById('qty');
    const qty = qtyEl ? parseInt(qtyEl.value) || 1 : 1;
    NHDCart.addItem({
      name: 'Creme de la Creme',
      price: 40.00,
      image: 'https://nhd-static-assets.s3.amazonaws.com/cdn/6477946868cf8693cfa8ace3/651c90432bb062c3aeb28086_DSC_7144.JPG',
      quantity: qty,
      options: options,
      weight: 4
    });
  }
  </script>
</body>
</html>
