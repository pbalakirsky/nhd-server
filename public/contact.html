<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Contact Us — Nina's Homemade Delights</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=WindSong:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
  <meta name="description" content="Contact Nina's Homemade Delights for custom orders, questions, or wholesale inquiries. Call 443-204-4402 or email us from Ellicott City, MD." />
  <meta property="og:title" content="Contact Us — Nina's Homemade Delights" />
  <meta property="og:description" content="Contact Nina's Homemade Delights for custom orders, questions, or wholesale inquiries. Call 443-204-4402 or email us from Ellicott City, MD." />
  <meta property="og:image" content="https://nhd-static-assets.s3.amazonaws.com/cdn/64779458477d1aa4405357ad/64ac646aa0159eddda1a5f5e_NinaSergeyWedding_0088%201.png" />
  <meta property="og:url" content="https://www.ninashomemadedelights.com/contact.html" />
  <meta property="og:type" content="website" />
</head>
<body>

  <!-- Nav injected by components.js -->

  <main>
    <section class="page-hero">
      <h1>Get In Touch</h1>
      <p>Have questions? Interested in a custom order? We're here for you!</p>
    </section>

    <section class="section section-cream">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info">
            <div class="contact-info-card">
              <div class="contact-icon">📞</div>
              <h4>Phone</h4>
              <a href="tel:+14432044402">443-204-4402</a>
            </div>
            <div class="contact-info-card">
              <div class="contact-icon">✉️</div>
              <h4>Email</h4>
              <a href="mailto:nina@ninashomemadedelights.com">nina@ninashomemadedelights.com</a>
            </div>
            <div class="contact-info-card">
              <div class="contact-icon">📘</div>
              <h4>Facebook</h4>
              <a href="https://www.facebook.com/NinasHomemadeDelights/" target="_blank">Nina's Homemade Delights</a>
            </div>
          </div>

          <form class="contact-form" id="contact-form">
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" required />
              </div>
              <div class="form-group">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" required />
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" />
            </div>
            <div class="form-group">
              <label for="company">Company</label>
              <input type="text" id="company" name="company" />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <div class="form-success" id="contact-success">Thanks for reaching out! We'll get back to you soon.</div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer injected by components.js -->

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type="submit"]');
  var origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    var firstName = (this.querySelector('[name="first-name"]') || {}).value || '';
    var lastName = (this.querySelector('[name="last-name"]') || {}).value || '';
    var fullName = (firstName + ' ' + lastName).trim();
    var res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: fullName,
        email: this.querySelector('[name="email"]').value,
        message: this.querySelector('[name="message"]').value,
        phone: this.querySelector('[name="phone"]') ? this.querySelector('[name="phone"]').value : '',
        company: this.querySelector('[name="company"]') ? this.querySelector('[name="company"]').value : ''
      })
    });
    var data = await res.json();
    if (data.success) {
      this.style.display = 'none';
      document.getElementById('contact-success').style.display = 'block';
    } else {
      alert(data.error || 'Something went wrong. Please try again.');
    }
  } catch (err) {
    alert('Could not send message. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
});
  </script>
</body>
</html>
