<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5e6e0" />
  <title>Contact Us — Nina's Homemade Delights</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Halant:wght@400;500;600;700&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=WindSong:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/modern.css" />
</head>
<body>

  <!-- Nav injected by components.js -->

  <main>
    <section class="page-hero">
      <h1>Get In Touch</h1>
      <p>Have questions? Interested in a custom order? We're here for you!</p>
    </section>

    <section class="section section-cream">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info">
            <div class="contact-info-card">
              <div class="contact-icon">📞</div>
              <h4>Phone</h4>
              <a href="tel:+14432044402">443-204-4402</a>
            </div>
            <div class="contact-info-card">
              <div class="contact-icon">✉️</div>
              <h4>Email</h4>
              <a href="mailto:nina@ninashomemadedelights.com">nina@ninashomemadedelights.com</a>
            </div>
            <div class="contact-info-card">
              <div class="contact-icon">📘</div>
              <h4>Facebook</h4>
              <a href="https://www.facebook.com/NinasHomemadeDelights/" target="_blank">Nina's Homemade Delights</a>
            </div>
          </div>

          <form class="contact-form" id="contact-form" action="#" onsubmit="return handleContactSubmit(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" required />
              </div>
              <div class="form-group">
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" required />
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" />
            </div>
            <div class="form-group">
              <label for="company">Company</label>
              <input type="text" id="company" name="company" />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <div class="form-success" id="form-success">Thanks for reaching out! We'll get back to you soon.</div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer injected by components.js -->

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    function handleContactSubmit(e) {
      e.preventDefault();
      document.getElementById('contact-form').style.display = 'none';
      document.getElementById('form-success').style.display = 'block';
      return false;
    }
  </script>
</body>
</html>
